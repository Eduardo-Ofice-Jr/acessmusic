<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Painel Administrativo</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body style="display: flex; align-items: center; justify-content: center; min-height: 100vh;">
    <div class="container">
        <div class="card-base form-container form-login">
            <h1 style="text-align: center; font-size: 1.5rem;">Painel Admin</h1>
            <form id="loginForm">
                <input type="text" id="username" class="input-field" placeholder="Usuário" required>
                <input type="password" id="password" class="input-field" placeholder="Palavra passe" required>
                <button type="submit" class="btn-block">Entrar</button>
            </form>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').onsubmit = async (e) => {
            e.preventDefault();
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user, pass }),
                    credentials: 'include'
                });

                if (res.ok) {
                    window.location.href = '/admin/dashboard.html';
                } else if (res.status === 401) {
                    alert("Usuário ou senha incorretos!");
                } else {
                    alert("Erro no servidor, tente novamente.");
                }
            } catch (err) {
                console.error(err);
                alert("Erro de conexão com o servidor");
            }
        };
    </script>
</body>
</html>
